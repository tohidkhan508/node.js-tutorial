service: youtube-api
frameworkVersion: "4"

privder:
  name: aws
  runtime: nodejs20.x

functions:
  youtubeHelloFn:
    handler: hello.handler
    events:
      - httpApi:
        path: /hello
        method: GET
  youtubeByeFn:
    handler: bye.handler
    events:
      - httpApi:
          path: /bye
          method: GET
